<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile — Bhagalpur Stays</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../static/css/variables.css"><link rel="stylesheet" href="../static/css/global.css">
  <link rel="stylesheet" href="../static/css/components.css"><link rel="stylesheet" href="../static/css/animations.css">
  <link rel="stylesheet" href="../static/css/navbar.css"><link rel="stylesheet" href="../static/css/dashboard.css">
</head>
<body>
  <div id="nav-slot"></div>
  <main>
    <div class="container" style="padding-block: var(--s-8); max-width: 800px;">
      <h1>My Profile</h1>
      <p class="muted">Manage your personal information and preferences</p>
      
      <div id="profile-content" style="margin-top: var(--s-6);">
        <div class="text-center" style="padding: var(--s-8);">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      
      <div id="login-prompt" class="hidden text-center" style="padding: var(--s-8);">
        <p class="muted">Please log in to view your profile.</p>
        <a href="/login" class="btn btn-primary" style="margin-top: var(--s-4);">Login</a>
      </div>
    </div>
  </main>
  <div id="footer-slot"></div>
  <script src="../static/js/partials.js"></script>
  <script>
    function getToken() {
      return localStorage.getItem('access_token');
    }

    async function loadProfile() {
      var token = getToken();
      if (!token) {
        document.getElementById('profile-content').classList.add('hidden');
        document.getElementById('login-prompt').classList.remove('hidden');
        return;
      }

      try {
        var res = await fetch('/api/users/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) {
          document.getElementById('profile-content').classList.add('hidden');
          document.getElementById('login-prompt').classList.remove('hidden');
          return;
        }
        var user = await res.json();
        renderProfile(user);
      } catch(e) {
        console.error(e);
      }
    }

    function renderProfile(user) {
      var initials = (user.full_name || 'U').charAt(0).toUpperCase();
      var html = '<div class="card" style="margin-bottom: var(--s-5);">' +
        '<div class="card-body" style="display:flex; align-items:center; gap: var(--s-5);">' +
          '<div class="avatar" style="width:80px; height:80px; font-size:32px; background:var(--grad-brand); color:#fff;">' + initials + '</div>' +
          '<div>' +
            '<h2 style="font-family:var(--font-sans); font-size:var(--fs-2xl);">' + user.full_name + '</h2>' +
            '<p class="muted">' + user.email + (user.phone ? ' · ' + user.phone : '') + '</p>' +
            '<span class="badge badge-success">' + user.role + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--s-5);">' +
        '<div class="card"><div class="card-body">' +
          '<h3 style="font-family:var(--font-sans); margin-bottom: var(--s-4);">Edit Profile</h3>' +
          '<form onsubmit="updateProfile(event)" style="display:flex;flex-direction:column;gap: var(--s-4);">' +
            '<div class="form-group"><label class="form-label">Full Name</label><input class="input" id="edit-name" value="' + user.full_name + '"></div>' +
            '<div class="form-group"><label class="form-label">Phone</label><input class="input" id="edit-phone" value="' + (user.phone || '') + '"></div>' +
            '<button type="submit" class="btn btn-primary">Save Changes</button>' +
          '</form>' +
        '</div></div>' +

        '<div class="card"><div class="card-body">' +
          '<h3 style="font-family:var(--font-sans); margin-bottom: var(--s-4);">Change Password</h3>' +
          '<form onsubmit="changePassword(event)" style="display:flex;flex-direction:column;gap: var(--s-4);">' +
            '<div class="form-group"><label class="form-label">Current Password</label><input class="input" type="password" id="current-password" required></div>' +
            '<div class="form-group"><label class="form-label">New Password</label><input class="input" type="password" id="new-password" required></div>' +
            '<button type="submit" class="btn btn-outline">Change Password</button>' +
          '</form>' +
        '</div></div>' +
      '</div>' +

      '<div style="margin-top: var(--s-5);">' +
        '<button class="btn btn-ghost" onclick="logout()" style="color:var(--danger);">Logout</button>' +
      '</div>';

      document.getElementById('profile-content').innerHTML = html;
    }

    async function updateProfile(e) {
      e.preventDefault();
      var token = getToken();
      var name = document.getElementById('edit-name').value.trim();
      var phone = document.getElementById('edit-phone').value.trim();
      
      try {
        var res = await fetch('/api/users/me', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ full_name: name, phone: phone })
        });
        if (res.ok) {
          window.toast('Profile updated!', 'success');
        }
      } catch(e) {
        window.toast('Failed to update', 'error');
      }
    }

    async function changePassword(e) {
      e.preventDefault();
      var token = getToken();
      var current = document.getElementById('current-password').value;
      var newPass = document.getElementById('new-password').value;

      if (newPass.length < 8) {
        window.toast('Password must be at least 8 characters', 'error');
        return;
      }

      try {
        var res = await fetch('/api/users/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ current_password: current, new_password: newPass })
        });
        var data = await res.json();
        if (res.ok) {
          window.toast('Password changed!', 'success');
          document.getElementById('current-password').value = '';
          document.getElementById('new-password').value = '';
        } else {
          window.toast(data.detail || 'Failed', 'error');
        }
      } catch(e) {
        window.toast('Network error', 'error');
      }
    }

    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      localStorage.removeItem('user');
      window.toast('Logged out', 'info');
      setTimeout(function() { location.href = '/'; }, 500);
    }

    loadProfile();
  </script>
  <script type="module" src="../static/js/app.js"></script>
</body>
</html>
