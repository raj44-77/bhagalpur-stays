<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support — Bhagalpur Stays</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../static/css/variables.css"><link rel="stylesheet" href="../static/css/global.css">
  <link rel="stylesheet" href="../static/css/components.css"><link rel="stylesheet" href="../static/css/animations.css">

<body>
  <div id="nav-slot"></div>
  <main>
    <div class="container" style="padding-block: var(--s-8); max-width: 860px;">
      <div style="text-align:center; margin-bottom: var(--s-8);">
        <span class="eyebrow gold">Help Center</span>
        <h1 style="margin-top: 8px;">How can we help you?</h1>
        <p class="muted">Search our knowledge base or get in touch with our Bhagalpur support team.</p>

      <div style="display:flex; gap: var(--s-3); margin-bottom: var(--s-8);">
        <input class="input" placeholder="Search for help articles..." style="flex:1;">
        <button class="btn btn-primary">Search</button>
      </div>
      <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--s-4);">
        <a href="/faq" class="card" style="text-decoration:none;"><div class="card-body text-center" style="padding: var(--s-6);"><div style="font-size:40px; margin-bottom: var(--s-3);">📖</div><h4>FAQs</h4><p class="muted" style="font-size:var(--fs-sm);">Common questions answered</p></div></a>

        <a href="/terms" class="card" style="text-decoration:none;"><div class="card-body text-center" style="padding: var(--s-6);"><div style="font-size:40px; margin-bottom: var(--s-3);">📋</div><h4>Policies</h4><p class="muted" style="font-size:var(--fs-sm);">Cancellation & refunds</p></div></a>
      </div>
    </div>

  <div id="footer-slot"></div>
  <script src="../static/js/partials.js"></script>
  <script type="module" src="../static/js/app.js"></script>
