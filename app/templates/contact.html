<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Bhagalpur Stays</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../static/css/variables.css"><link rel="stylesheet" href="../static/css/global.css">
  <link rel="stylesheet" href="../static/css/components.css"><link rel="stylesheet" href="../static/css/animations.css">
  <link rel="stylesheet" href="../static/css/navbar.css"><link rel="stylesheet" href="../static/css/contact.css">
<link rel="stylesheet" href="../static/css/responsive.css"></head>
<body>
  <div id="nav-slot"></div>
  <main>
    <div class="container" style="padding-block: var(--s-8);">
      <div style="text-align:center; max-width: 700px; margin: 0 auto var(--s-8);">
        <span class="eyebrow gold">Get in touch</span>
        <h1 style="margin-top: 8px;">We're here to help</h1>
        <p class="muted">Reach out for support, partnerships or any question about your stay.</p>
      </div>
      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--s-6);" id="contact-grid">
        <div class="card"><div class="card-body">
          <h3 style="font-family: var(--font-sans); margin-bottom: var(--s-4);">Send us a message</h3>
          <form class="grid" style="gap: var(--s-4);" onsubmit="event.preventDefault(); window.toast('Message sent — we&apos;ll respond within 2 hours','success')">
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--s-3);">
              <div class="form-group"><label class="form-label">Name</label><input class="input" required></div>
              <div class="form-group"><label class="form-label">Email</label><input class="input" type="email" required></div>
            </div>
            <div class="form-group"><label class="form-label">Subject</label><input class="input"></div>
            <div class="form-group"><label class="form-label">Message</label><textarea class="textarea" required></textarea></div>
            <button class="btn btn-primary">Send Message</button>
          </form>
        </div></div>
        <div class="grid" style="gap: var(--s-4);">
          <div class="card"><div class="card-body">
            <h4 style="font-family: var(--font-sans); font-size: var(--fs-md);">📞 Call Us</h4>
            <p class="muted" style="margin-top: 4px;">+91 800 123 4567 · 24×7 Hindi & English</p>
          </div></div>
          <div class="card"><div class="card-body">
            <h4 style="font-family: var(--font-sans); font-size: var(--fs-md);">✉️ Email</h4>
            <p class="muted" style="margin-top: 4px;">hello@bhagalpurstays.com</p>
          </div></div>
          <div class="card"><div class="card-body">
            <h4 style="font-family: var(--font-sans); font-size: var(--fs-md);">📍 Office</h4>
            <p class="muted" style="margin-top: 4px;">3rd Floor, Silk Plaza, Adampur, Bhagalpur, Bihar — 812001</p>
          </div></div>
          <div class="map-box"><div class="pin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><circle cx="12" cy="10" r="3"/></svg></div></div>
        </div>
      </div>
    </div>
  </main>
  <style>@media(max-width:800px){#contact-grid{grid-template-columns:1fr !important;}}</style>
  <div id="footer-slot"></div>
  <script src="../static/js/partials.js"></script>
<script type="module" src="../static/js/app.js"></script>
</body>
</html>
