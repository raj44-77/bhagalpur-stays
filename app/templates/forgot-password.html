<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password — Bhagalpur Stays</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../static/css/variables.css"><link rel="stylesheet" href="../static/css/global.css">
  <link rel="stylesheet" href="../static/css/components.css"><link rel="stylesheet" href="../static/css/animations.css">
  <link rel="stylesheet" href="../static/css/navbar.css"><link rel="stylesheet" href="../static/css/auth.css">
<link rel="stylesheet" href="../static/css/responsive.css"></head>
<body>
  <div id="nav-slot"></div>
  <main>
    <div class="auth-wrap">
      <aside class="auth-side">
        <a class="brand" href="/"><span class="logo-mark">A</span> Bhagalpur Stays</a>
        <div><h2>Forgot your<br>password?</h2><p style="color: rgba(255,255,255,.75); margin-top: 12px;">No worries — we'll help you get back into your account in seconds.</p></div>
        <div></div>
      </aside>
      <section class="auth-form-wrap">
        <div class="auth-form" id="form-email">
          <h1>Reset password</h1>
          <p class="sub">Enter your email and we'll send you a reset link</p>
          <form onsubmit="sendResetLink(event)">
            <div class="float-field"><input class="input" type="email" placeholder=" " required id="reset-email"><label class="float-label">Email address</label></div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Send reset link</button>
          </form>
          <div class="foot"><a href="/login">← Back to login</a></div>
        </div>
        <div class="auth-form hidden" id="form-token">
          <h1>Reset password</h1>
          <p class="sub">Enter the token sent to your email and your new password</p>
          <form onsubmit="resetPassword(event)">
            <div class="float-field"><input class="input" type="text" placeholder=" " required id="reset-token"><label class="float-label">Reset token</label></div>
            <div class="float-field"><input class="input" type="password" placeholder=" " required id="new-password"><label class="float-label">New password</label></div>
            <div class="float-field"><input class="input" type="password" placeholder=" " required id="confirm-password"><label class="float-label">Confirm password</label></div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Reset Password</button>
          </form>
          <div class="foot"><a href="/login">← Back to login</a></div>
        </div>
      </section>
    </div>
  </main>
  <script src="../static/js/partials.js"></script>
  <script>
    var resetToken = '';

    async function sendResetLink(e) {
      e.preventDefault();
      var email = document.getElementById('reset-email').value.trim();
      if (!email) {
        window.toast('Please enter your email', 'error');
        return;
      }
      try {
        var res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        var data = await res.json();
        if (res.ok && data.debug_token) {
          resetToken = data.debug_token;
          document.getElementById('form-email').classList.add('hidden');
          document.getElementById('form-token').classList.remove('hidden');
          document.getElementById('reset-token').value = data.debug_token;
          window.toast('Reset token generated! (Check console in production)', 'success');
        } else {
          window.toast(data.detail || 'Failed to send reset link', 'error');
        }
      } catch(err) {
        window.toast('Network error', 'error');
      }
    }

    async function resetPassword(e) {
      e.preventDefault();
      var token = document.getElementById('reset-token').value.trim();
      var newPassword = document.getElementById('new-password').value;
      var confirmPassword = document.getElementById('confirm-password').value;

      if (!token || !newPassword) {
        window.toast('Please fill all fields', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        window.toast('Passwords do not match', 'error');
        return;
      }
      if (newPassword.length < 8) {
        window.toast('Password must be at least 8 characters', 'error');
        return;
      }

      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, new_password: newPassword })
        });
        var data = await res.json();
        if (res.ok) {
          window.toast('Password reset successful! Please login.', 'success');
          setTimeout(function() { location.href = '/login'; }, 1500);
        } else {
          window.toast(data.detail || 'Reset failed', 'error');
        }
      } catch(err) {
        window.toast('Network error', 'error');
      }
    }
  </script>
  <script type="module" src="../static/js/app.js"></script>
</body>
</html>
